<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ event }} - {{ Logo }}</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <div class="text-center mb-4">
            <h1 class="display-4">{{ event }}</h1>
            <img src="{{ Logo }}" alt="Logo" class="img-fluid" style="max-width: 200px;">
        </div>
        {% if warning %}
        <div class="alert alert-warning" role="alert">
            ⚠️ {{ warning }}
        </div>
        {% endif %}
        <!-- File Upload Section -->
        <div class="card mb-4">
            <div class="card-header"><strong>Ergebnisdateien hochladen</strong></div>
            <div class="card-body">
                <div id="dropZone"
                     style="border: 2px dashed #6c757d; border-radius: 8px; padding: 40px; text-align: center; color: #6c757d; cursor: pointer; transition: background 0.2s;">
                    <p class="mb-1">Dateien hier hineinziehen oder klicken zum Auswählen</p>
                    <p class="mb-0 small">Erlaubte Dateien:
                        <em>Swim 100 &amp; Run 400.txt, Swim 200 &amp; Run 1200.txt, Swim 400 &amp; Run 2500.txt, Swim 800 &amp; Run 5000.txt, Swim 800 &amp; Run 5000 Staffel.txt</em>
                    </p>
                    <input type="file" id="fileInput" multiple accept=".txt" style="display:none;">
                </div>
                <div id="uploadResults" class="mt-3"></div>
            </div>
        </div>

        <form id="wettkampfForm" class="mb-4" action="/createCert" method="post">
            <div class="form-group">
                <label for="wettkampfSelect">Wettkampf auswählen:</label>
                <select id="wettkampfSelect" name="wettkampf_name" class="form-control">
                    {% for wettkampf in wettkampf %}
                        <option value="{{ wettkampf }}">{{ wettkampf }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="onlyTop3" name="onlyTop3">
                <label class="form-check-label" for="onlyTop3">Only Top 3</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="withBackground" name="withBackground">
                <label class="form-check-label" for="withBackground">With Background</label>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>

    </div>

    <script>
        const dropZone   = document.getElementById('dropZone');
        const fileInput  = document.getElementById('fileInput');
        const resultsDiv = document.getElementById('uploadResults');

        // Click opens file picker
        dropZone.addEventListener('click', () => fileInput.click());

        // Drag-over highlight
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.background = '#e9f5ff';
            dropZone.style.borderColor = '#007bff';
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.style.background = '';
            dropZone.style.borderColor = '#6c757d';
        });

        // Drop
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.background = '';
            dropZone.style.borderColor = '#6c757d';
            uploadFiles(e.dataTransfer.files);
        });

        // File picker change
        fileInput.addEventListener('change', () => {
            uploadFiles(fileInput.files);
            fileInput.value = '';
        });

        function uploadFiles(files) {
            if (!files || files.length === 0) return;
            const formData = new FormData();
            for (const file of files) {
                formData.append('files', file, file.name);
            }
            resultsDiv.innerHTML = '<p class="text-muted">Wird hochgeladen…</p>';
            fetch('/upload', { method: 'POST', body: formData })
                .then(r => r.json())
                .then(results => {
                    resultsDiv.innerHTML = results.map(r => {
                        const cls = r.status === 'ok' ? 'success' : 'danger';
                        const icon = r.status === 'ok' ? '✅' : '❌';
                        return `<div class="alert alert-${cls} py-2 mb-1">${icon} ${r.message}</div>`;
                    }).join('');
                })
                .catch(err => {
                    resultsDiv.innerHTML = `<div class="alert alert-danger">Fehler beim Hochladen: ${err}</div>`;
                });
        }
    </script>
</body>
</html>
